name: Build & Test (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-clang:
    name: Clang Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install libevent openssl pkg-config

      - name: Configure CMake
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix openssl)/lib/pkgconfig:$(brew --prefix libevent)/lib/pkgconfig"
          export OPENSSL_DIR="$(brew --prefix openssl)"
          export LIBEVENT_DIR="$(brew --prefix libevent)"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR="$OPENSSL_DIR" \
            -DOPENSSL_INCLUDE_DIR="$OPENSSL_DIR/include" \
            -DOPENSSL_SSL_LIBRARY="$OPENSSL_DIR/lib/libssl.dylib" \
            -DOPENSSL_CRYPTO_LIBRARY="$OPENSSL_DIR/lib/libcrypto.dylib" \
            -DLIBEVENT_ROOT_DIR="$LIBEVENT_DIR" \
            -DLIBEVENT_LIBRARIES="$LIBEVENT_DIR/lib/libevent.dylib" \
            -DCMAKE_C_FLAGS="-I$OPENSSL_DIR/include -I$LIBEVENT_DIR/include" \
            -DCMAKE_CXX_FLAGS="-I$OPENSSL_DIR/include -I$LIBEVENT_DIR/include" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$LIBEVENT_DIR/lib -L$OPENSSL_DIR/lib" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L$LIBEVENT_DIR/lib -L$OPENSSL_DIR/lib"

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  integration:
    name: Integration Tests (RabbitMQ)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install libevent openssl pkg-config

      - name: Install and start RabbitMQ
        run: |
          brew install rabbitmq
          brew services start rabbitmq
          # Ждать готовности
          for i in $(seq 1 30); do
            if rabbitmqctl status 2>/dev/null | grep -q "Runtime"; then
              echo "RabbitMQ ready"
              exit 0
            fi
            echo "Waiting for RabbitMQ... $i"
            sleep 2
          done
          echo "RabbitMQ not ready" && exit 1

      - name: Configure CMake
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix openssl)/lib/pkgconfig:$(brew --prefix libevent)/lib/pkgconfig"
          export OPENSSL_DIR="$(brew --prefix openssl)"
          export LIBEVENT_DIR="$(brew --prefix libevent)"
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DBUILD_INTEGRATION_TESTS=ON \
            -DOPENSSL_ROOT_DIR="$OPENSSL_DIR" \
            -DOPENSSL_INCLUDE_DIR="$OPENSSL_DIR/include" \
            -DOPENSSL_SSL_LIBRARY="$OPENSSL_DIR/lib/libssl.dylib" \
            -DOPENSSL_CRYPTO_LIBRARY="$OPENSSL_DIR/lib/libcrypto.dylib" \
            -DLIBEVENT_ROOT_DIR="$LIBEVENT_DIR" \
            -DLIBEVENT_LIBRARIES="$LIBEVENT_DIR/lib/libevent.dylib" \
            -DCMAKE_C_FLAGS="-I$OPENSSL_DIR/include -I$LIBEVENT_DIR/include" \
            -DCMAKE_CXX_FLAGS="-I$OPENSSL_DIR/include -I$LIBEVENT_DIR/include" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$LIBEVENT_DIR/lib -L$OPENSSL_DIR/lib" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L$LIBEVENT_DIR/lib -L$OPENSSL_DIR/lib"

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: "5672"
