name: Build & Test (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-msvc:
    name: MSVC Release + Unit Tests
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-windows-${{ hashFiles('.github/workflows/build-windows.yml') }}
          restore-keys: vcpkg-windows-

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install poco[netssl]:x64-windows
          vcpkg install openssl:x64-windows
          vcpkg install nlohmann-json:x64-windows

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test (unit)
        working-directory: build
        run: ctest --output-on-failure -C Release -R "Message|CallContext"

  build-debug:
    name: MSVC Debug
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-windows-${{ hashFiles('.github/workflows/build-windows.yml') }}
          restore-keys: vcpkg-windows-

      - name: Install dependencies
        run: |
          vcpkg install poco[netssl]:x64-windows
          vcpkg install openssl:x64-windows
          vcpkg install nlohmann-json:x64-windows

      - name: Configure CMake (Debug)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Test (unit)
        working-directory: build
        run: ctest --output-on-failure -C Debug -R "Message|CallContext"

  integration:
    name: Integration Tests (RabbitMQ)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-windows-${{ hashFiles('.github/workflows/build-windows.yml') }}
          restore-keys: vcpkg-windows-

      - name: Install dependencies
        run: |
          vcpkg install poco[netssl]:x64-windows
          vcpkg install openssl:x64-windows

      - name: Start RabbitMQ (Docker)
        run: |
          docker run -d --name rabbitmq --platform=linux/amd64 -p 5672:5672 -p 15672:15672 rabbitmq:3-management
          Write-Host "Waiting for RabbitMQ..."
          Start-Sleep -Seconds 15

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBUILD_TESTS=ON -DBUILD_INTEGRATION_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: "5672"
