name: Build & Test (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-msvc:
    name: MSVC Release + Unit Tests
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-windows-${{ hashFiles('.github/workflows/build-windows.yml') }}
          restore-keys: vcpkg-windows-

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install poco[netssl]:x64-windows
          vcpkg install openssl:x64-windows
          vcpkg install nlohmann-json:x64-windows

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test (unit)
        working-directory: build
        run: ctest --output-on-failure -C Release -R "Message|CallContext"

  build-debug:
    name: MSVC Debug
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-windows-${{ hashFiles('.github/workflows/build-windows.yml') }}
          restore-keys: vcpkg-windows-

      - name: Install dependencies
        run: |
          vcpkg install poco[netssl]:x64-windows
          vcpkg install openssl:x64-windows
          vcpkg install nlohmann-json:x64-windows

      - name: Configure CMake (Debug)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Test (unit)
        working-directory: build
        run: ctest --output-on-failure -C Debug -R "Message|CallContext"

# Интеграционные тесты на Windows — требуют локальный RabbitMQ.
# GitHub Actions Windows раннеры не поддерживают Linux-контейнеры Docker.
# Для проверки: установить RabbitMQ локально и запустить:
#   cmake -B build -DBUILD_TESTS=ON -DBUILD_INTEGRATION_TESTS=ON
#   cmake --build build --config Release
#   $env:RABBITMQ_HOST="localhost" && ctest --test-dir build -C Release
