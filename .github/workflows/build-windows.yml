name: Build & Test (Windows)

# Временно отключен: AMQP-CPP v4.1.4 несовместим с MSVC 2025.
# Будет активирован после обновления до AMQP-CPP с поддержкой MSVC.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build-msvc:
    name: MSVC Release
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install poco[netssl]:x64-windows
          vcpkg install openssl:x64-windows
          vcpkg install nlohmann-json:x64-windows

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

  build-asan:
    name: MSVC + AddressSanitizer
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          vcpkg install poco[netssl]:x64-windows
          vcpkg install openssl:x64-windows

      - name: Configure (ASan)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_ASAN=ON -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure
